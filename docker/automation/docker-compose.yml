services:
  n8n:
    container_name: n8n-server
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - ./data:/root/.n8n
      - ./files:/files
    depends_on:
      - postgres
    environment:
      - N8N_HOST=n8n.rufuslab.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://n8n.rufuslab.com
      - N8N_TRUSTED_PROXIES=0.0.0.0/0
      - N8N_RUNNERS_ENABLED=true
  # If you're running your own external PostgreSQL instance, you can comment out this service
  postgres:
    container_name: n8n-db
    image: postgres:15
    restart: always
    env_file:
      - .env
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
